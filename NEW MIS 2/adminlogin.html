<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Staff Login | UMD Consumer Insight & Analytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="style.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;800;900&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#811026",
          "secondary-container": "#fecb32",
          "surface": "#faf9fa",
          "on-surface": "#1a1c1d"
        }
      }
    }
  }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    /* CSS-Only Mobile Menu */
    #mobile-menu-toggle { display: none; }
    @media (max-width: 767px) {
        #mobile-menu-toggle:checked ~ #nav-links-container {
            display: flex !important;
        }
    }
</style>
</head>
<body class="bg-surface text-on-surface">

<!-- Top Navigation -->
<nav class="fixed top-0 w-full z-50 bg-white/95 dark:bg-[#1a1c1d]/95 backdrop-blur-md shadow-sm dark:shadow-none transition-all duration-300">
    <div class="flex items-center justify-between px-6 md:px-8 py-4 max-w-screen-2xl mx-auto flex-wrap">
        <a class="font-['Work_Sans'] font-black text-xl tracking-tighter text-[#811026] dark:text-[#ffdadb] z-50" href="index.html">UMD Consumer Insight &amp; Analytics</a>
        
        <input type="checkbox" id="mobile-menu-toggle" class="hidden">
        
        <!-- Mobile Dropdown Toggle Button -->
        <label for="mobile-menu-toggle" class="md:hidden flex items-center p-2 text-[#811026] dark:text-[#fecb32] hover:bg-surface-variant rounded-xl transition-colors cursor-pointer z-50">
            <span class="material-symbols-outlined text-3xl transition-transform duration-300" style="font-variation-settings: 'wght' 600;">menu</span>
        </label>

        <!-- Dropdown Container -->
        <div id="nav-links-container" class="hidden absolute md:relative top-full left-0 w-full md:w-auto md:flex items-center flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-8 font-['Work_Sans'] font-medium text-sm tracking-tight bg-white md:bg-transparent shadow-lg md:shadow-none p-6 md:p-0 border-t md:border-none border-outline-variant/20 z-40">
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="index.html">Home</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="about.html">About</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="academics.html">Academics</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="faculty.html">Faculty</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="centers.html">Community</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="news.html">News</a>
            <a class="block w-full md:w-auto text-center md:text-left text-[#2a2a2a] dark:text-[#e3e2e3] hover:text-[#811026] dark:hover:text-[#fecb32] hover:bg-surface-variant md:hover:bg-transparent p-3 md:p-0 rounded-xl md:rounded-none transition-all duration-300 font-medium" href="info.html">Info</a>
            
            <!-- Mobile Action Buttons Block -->
            <div class="flex md:hidden flex-col items-center gap-3 w-full border-t border-outline-variant/20 pt-6 mt-4">
                <a class="w-full text-center px-5 py-3 rounded-xl bg-[#811026] text-white font-bold hover:bg-[#fecb32] hover:text-[#1a1c1d] transition-all duration-300 shadow-md" href="contact.html">Contact Us</a>
            </div>
        </div>
    </div>
</nav>

<main class="pt-[140px] px-6 pb-20 min-h-[90vh] flex flex-col justify-center">
  <div class="max-w-3xl mx-auto w-full">
    <section class="mb-8 md:mb-12 text-center px-4">
      <span class="text-secondary-container font-semibold uppercase tracking-[0.35em] text-[10px] md:text-xs">Staff Access</span>
      <h1 class="mt-3 md:mt-4 text-3xl sm:text-4xl md:text-5xl font-black text-[#1a1c1d] md:leading-tight">Staff Login</h1>
      <p class="mt-3 md:mt-4 text-sm md:text-base text-[#575757] max-w-lg md:max-w-2xl mx-auto px-4 md:px-0">Sign in with your UMD Staff credentials to manage content and access the dashboard. Your password is protected as you type.</p>
    </section>

    <section class="rounded-[2rem] md:rounded-[32px] border border-[#e6e0e0] bg-white shadow-xl shadow-[#000000]/5 overflow-hidden mx-2 md:mx-0">
      <div class="p-8 md:p-12">
        <div class="space-y-6">
          <div>
            <label class="block text-xs md:text-sm font-semibold text-[#272727] mb-2 uppercase tracking-widest" for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter your username" class="w-full rounded-2xl md:rounded-3xl border border-[#d4d4d4] bg-[#f9f9f9] px-4 py-3 md:px-5 md:py-4 text-sm text-[#1a1c1d] outline-none transition-all duration-200 focus:border-[#811026] focus:ring-2 focus:ring-[#811026]/20" />
          </div>

          <div>
            <label class="block text-xs md:text-sm font-semibold text-[#272727] mb-2 uppercase tracking-widest" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" class="w-full rounded-2xl md:rounded-3xl border border-[#d4d4d4] bg-[#f9f9f9] px-4 py-3 md:px-5 md:py-4 text-sm text-[#1a1c1d] outline-none transition-all duration-200 focus:border-[#811026] focus:ring-2 focus:ring-[#811026]/20" />
          </div>

          <div class="space-y-3 pt-2">
            <a href="admin.html" class="w-full inline-flex justify-center rounded-2xl md:rounded-3xl bg-[#811026] px-6 py-3.5 md:py-4 text-sm md:text-base font-bold text-white shadow-lg shadow-[#811026]/20 transition-all duration-300 hover:bg-[#fecb32] hover:text-[#1a1c1d] hover:scale-[1.02]">Sign In</a>
            <a href="#" class="block w-full text-center py-2 text-xs md:text-sm font-semibold text-[#575757] transition-all duration-300 hover:text-[#811026]">Forgot Password?</a>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
</body>
</html>
