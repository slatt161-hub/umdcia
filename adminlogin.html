<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Staff Login | UMD Consumer Insight & Analytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;700;800;900&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#811026",
          "secondary-container": "#fecb32",
          "surface": "#faf9fa",
          "on-surface": "#1a1c1d"
        }
      }
    }
  }
</script>
</head>
<body class="bg-surface text-on-surface">
<nav class="fixed top-0 w-full z-50 bg-white/90 dark:bg-[#1a1c1d]/80 backdrop-blur-md shadow-sm">
  <div class="flex items-center justify-between px-8 py-4 max-w-screen-2xl mx-auto">
    <a class="font-['Work_Sans'] font-black text-xl tracking-tighter text-[#811026]" href="index.html">UMD Consumer Insight &amp; Analytics</a>
    <div class="hidden md:flex items-center space-x-8 font-['Work_Sans'] font-medium text-sm tracking-tight">
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="index.html">Home</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="about.html">About</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="academics.html">Academics</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="faculty.html">Faculty</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="centers.html">Community</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="news.html">News</a>
      <a class="text-[#2a2a2a] hover:text-[#811026] transition-all duration-300" href="info.html">Info</a>
    </div>

  </div>
</nav>
<main class="pt-32 px-6 pb-20 min-h-screen">
  <div class="max-w-3xl mx-auto">
    <section class="mb-12 text-center">
      <span class="text-secondary-container font-semibold uppercase tracking-[0.35em] text-xs">Staff Access</span>
      <h1 class="mt-4 text-4xl md:text-5xl font-black text-[#1a1c1d]">Staff Login</h1>
      <p class="mt-4 text-base text-[#575757] max-w-2xl mx-auto">Sign in with your UMD Staff credentials to manage content and access the dashboard. Your password is protected as you type.</p>
    </section>

    <section class="rounded-[32px] border border-[#e6e0e0] bg-white shadow-[0_28px_60px_-30px_rgba(0,0,0,0.25)] overflow-hidden">
      <div class="p-10 md:p-12">
        <form class="space-y-6" action="#" method="post">
          <div>
            <label class="block text-sm font-semibold text-[#272727] mb-2" for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Enter your username" class="w-full rounded-3xl border border-[#d4d4d4] bg-[#f9f9f9] px-5 py-4 text-sm text-[#1a1c1d] outline-none transition-all duration-200 focus:border-[#811026] focus:ring-2 focus:ring-[#811026]/20" required />
          </div>

          <div>
            <label class="block text-sm font-semibold text-[#272727] mb-2" for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" class="w-full rounded-3xl border border-[#d4d4d4] bg-[#f9f9f9] px-5 py-4 text-sm text-[#1a1c1d] outline-none transition-all duration-200 focus:border-[#811026] focus:ring-2 focus:ring-[#811026]/20" required />
          </div>

          <div class="space-y-4">
            <a href="admin.html" class="w-full inline-flex justify-center rounded-3xl bg-[#811026] px-6 py-4 text-sm font-semibold text-white shadow-lg shadow-[#811026]/20 transition-all duration-300 hover:bg-[#fecb32] hover:text-[#1a1c1d]">Sign In</a>
            <a href="#" class="w-full inline-flex justify-center rounded-3xl border border-[#d4d4d4] bg-[#f9f9f9] px-6 py-4 text-sm font-semibold text-[#1a1c1d] transition-all duration-300 hover:bg-[#fecb32] hover:text-[#1a1c1d]">Forgot Password?</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>
</body>
</html>
